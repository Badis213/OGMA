<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Inscription à l'événement d'OGMA">
    <title>OGMA - S'inscrire à un événement</title>
    <link rel="stylesheet" href="Assets/css/event-signin.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">OGMA</div>
        <div class="hamburger" id="hamburger">
            &#9776; <!-- Symbole du hamburger -->
        </div>
        <ul class="nav-links" id="nav-links">
            <li><a href="index.html">Accueil</a></li>
            <li><a href="evenements.html">Événements</a></li>
            <li><a href="bureau-provisoire.html">Bureau Provisoire</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li id="auth-links">
                <a href="signin.html" id="signin">S'inscrire</a>
            </li>
            <li id="auth-links">
                <a href="login.html" id="login">Se connecter</a>
            </li>
            <li id="profile-link" style="display: none;">
                <a href="profile.html">Profil</a>
            </li>
        </ul>
    </nav>
    

    <!-- Bandeau principal -->
    <header>
        <div>
            <h1>Inscription à l'événement</h1>
            <p>Complétez le formulaire ci-dessous pour vous inscrire à l'événement à venir d'OGMA.</p>
        </div>
    </header>

    <!-- Formulaire d'inscription -->
    <section id="inscription-evenement">
        <h2>S'inscrire à l'événement</h2>
        <div class="event-registration">
            <form action="#" method="POST" class="registration-form">
                <div class="form-group">
                    <label for="prenom">Prénom</label>
                    <input type="text" id="prenom" name="prenom" placeholder="Entrez votre prénom" required>
                </div>
                <div class="form-group">
                    <label for="nom">Nom</label>
                    <input type="text" id="nom" name="nom" placeholder="Entrez votre nom" required>
                </div>
                <div class="form-group">
                    <label for="classe">Classe</label>
                    <input type="text" id="classe" name="classe" placeholder="Entrez votre classe" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Entrez votre email" required>
                </div>
                <div class="form-group">
                    <label for="mode">Mode de participation</label>
                    <select id="mode" name="mode" required>
                        <option value="presentiel">Présentiel</option>
                        <option value="distanciel">Distanciel</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" name="certification" required>
                        Je certifie être présent le [date] à [heure].
                    </label>
                </div>
                <button type="submit" class="btn-register">S'inscrire</button>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <p>&copy; 2024 OGMA - Tous droits réservés</p>
            <div class="social-links">
                <a href="https://instagram.com/ogma_asso" target="_blank">Instagram</a>
            </div>
        </div>
    </footer>

    <script src="Assets/js/script.js"></script>
</body>
</html>
